apiVersion: v1
kind: Pod
metadata:
  name: quiz
  namespace: kiada
spec:
  volumes:
  - name: initdb
    emptyDir: {}
  - name: quiz-data
    emptyDir: {}
  initContainers:
  - name: installer
    image: selgho/quiz-initdb-script-installer:0.1
    volumeMounts:
    - name: initdb
      mountPath: /initdb.d
  containers:
    - name: quiz-api
      image: selgho/quiz:0.1
      ports:
      - name: http
        containerPort: 8080
    - name: mongo
      image: mongo
      volumeMounts:
      - name: initdb
        mountPath: /docker-entrypoint-initdb.d/
        readOnly: true
      - name: quiz-data
        mountPath: /data/db